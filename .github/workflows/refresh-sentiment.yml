name: Refresh sentiment data

on:
  schedule:
    # 1st and 15th of every month at 03:00 UTC
    - cron: "0 3 1,15 * *"
  workflow_dispatch: # allow manual trigger from Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install vaderSentiment requests

      - name: Fetch sentiment data
        run: python data/scripts/fetch_sentiment.py

      - name: Commit updated sentiment.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/sentiment.json web/public/sentiment.json
          git diff --cached --quiet || git commit -m "chore: refresh Reddit sentiment data [skip ci]"
          git push
